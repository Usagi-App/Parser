name: Build and deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out website repository
        uses: actions/checkout@v6

      - name: Check out YakaTeam parser source
        uses: actions/checkout@v6
        with:
          repository: YakaTeam/kotatsu-parsers
          ref: master
          path: .cache/kotatsu-parsers

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate parser catalog JSON
        run: python scripts/build_catalog.py
        env:
          KOTATSU_REPO_DIR: .cache/kotatsu-parsers
          KOTATSU_OWNER: YakaTeam
          KOTATSU_REPO: kotatsu-parsers
          KOTATSU_BRANCH: master
          OUTPUT_PATH: public/data/sources.json

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
